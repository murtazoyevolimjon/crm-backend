version: '3.9'

services:
  db:
    image: postgres:16
    container_name: erp_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datapass}
      POSTGRES_DB: ${POSTGRES_DB:-erp_data}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5436}:5432'
    volumes:
      - baza_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_erp
    restart: always
    ports:
      - '127.0.0.1:${REDIS_PORT:-6389}:6379'

  app:
    build: .
    container_name: erp
    restart: always
    env_file:
      - .env
    ports:
      - '8002:3000'
    depends_on:
      - db
      - redis
    command: >
      sh -c "
        npx prisma generate &&
        npx prisma migrate deploy &&
        pnpm run build &&
        pnpm run start:dev
      "
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-datapass}@db:5432/${POSTGRES_DB:-erp_data}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379

volumes:
  baza_data:
